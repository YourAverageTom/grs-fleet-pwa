<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRS Fleet Calculator</title>

<!-- Tailwind CDN for styling -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* SPLASH STYLING */
#attractScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  text-align: center;
  cursor: pointer;
  z-index: 9999;
  clip-path: ellipse(140% 100% at 50% 0%);
  transform: translateY(0);
  transition: transform 0.6s ease;
  pointer-events: auto;
}

#attractScreen.slideUp {
  transform: translateY(-100%);
}

/* H1 + pulse text */
#attractScreen h1 {
  font-size: 3rem;
  font-weight: 800;
  max-width: 900px;
}

#attractScreen p {
  margin-top: 20px;
  font-size: 1.2rem;
  opacity: .8;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { opacity: .5; }
  50% { opacity: 1; }
  100% { opacity: .5; }
}

/* Calculator hidden by default */
#calculator {
  display: none;
  padding: 2rem;
}

/* Result styling */
#results {
  display: none;
  margin-top: 2rem;
}
</style>
</head>
<body class="bg-gray-900 text-white">

<!-- SPLASH SCREEN -->
<div id="attractScreen">
  <h1>Tap Anywhere to Calculate Your Fleet Savings</h1>
  <p>Discover potential fuel & fleet savings instantly</p>
</div>

<!-- CALCULATOR -->
<div id="calculator" class="hidden container mx-auto mt-12 max-w-xl">
  <form id="fleetForm" class="space-y-4">
    <input type="text" id="name" placeholder="Name" class="p-3 w-full border rounded-lg">
    <input type="email" id="email" placeholder="Email" class="p-3 w-full border rounded-lg">
    <input type="text" id="company" placeholder="Company Name" class="p-3 w-full border rounded-lg">
    <input type="number" id="fleet" placeholder="Fleet Size" class="p-3 w-full border rounded-lg">

    <select id="mileage" class="p-3 w-full border rounded-lg">
      <option value="">Annual Mileage per Vehicle</option>
      <option value="5000">5,000 miles</option>
      <option value="10000">10,000 miles</option>
      <option value="15000">15,000 miles</option>
      <option value="20000">20,000 miles</option>
      <option value="25000">25,000 miles</option>
      <option value="30000">30,000 miles</option>
      <option value="35000">35,000 miles</option>
      <option value="40000">40,000 miles</option>
      <option value="45000">45,000 miles</option>
      <option value="50000">50,000 miles</option>
    </select>

    <input type="number" id="mpg" placeholder="Average MPG" class="p-3 w-full border rounded-lg">
    <input type="number" id="fuelcost" placeholder="Fuel Cost (£/L)" value="1.45" class="p-3 w-full border rounded-lg">
    <input type="number" id="improvement" placeholder="Efficiency Improvement (%)" value="12" class="p-3 w-full border rounded-lg">

    <button type="button" id="calculateBtn" class="bg-blue-600 hover:bg-blue-700 w-full p-3 rounded-lg">Calculate</button>
    <button type="button" onclick="backToHome()" class="bg-gray-600 hover:bg-gray-700 w-full p-3 rounded-lg mt-2">Back to Home</button>
  </form>

  <div id="results" class="mt-6 text-lg"></div>
</div>

<script>
// GLOBAL TIMER
let inactivityTimer;

// RESET TIMER
function resetInactivityTimer() {
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(() => {
    backToHome();
  }, 45000); // 45 seconds
}

// SPLASH TAP HANDLER
const splash = document.getElementById("attractScreen");
splash.addEventListener("click", startCalculator);
splash.addEventListener("touchstart", startCalculator); // iPad support

function startCalculator() {
  const calc = document.getElementById("calculator");
  calc.classList.remove("hidden");   // show calculator immediately
  requestAnimationFrame(() => {
    splash.classList.add("slideUp"); // animate splash
  });
  resetInactivityTimer();
}

// BACK TO HOME
function backToHome() {
  clearTimeout(inactivityTimer);
  splash.classList.remove("slideUp");
  document.getElementById("calculator").classList.add("hidden");
  document.getElementById("results").classList.add("hidden");

  // Reset form
  document.getElementById('name').value='';
  document.getElementById('email').value='';
  document.getElementById('company').value='';
  document.getElementById('fleet').value='';
  document.getElementById('mileage').selectedIndex=0;
  document.getElementById('mpg').value='';
  document.getElementById('fuelcost').value='1.45';
  document.getElementById('fuelDisplay')?.innerText='1.45';
  document.getElementById('improvement').value='12';
}

// CALCULATE BUTTON (example logic)
document.getElementById("calculateBtn").addEventListener("click", () => {
  const fleet = parseFloat(document.getElementById('fleet').value)||0;
  const mileage = parseFloat(document.getElementById('mileage').value)||0;
  const mpg = parseFloat(document.getElementById('mpg').value)||0;
  const fuelcost = parseFloat(document.getElementById('fuelcost').value)||1.45;
  const improvement = parseFloat(document.getElementById('improvement').value)/100||0;

  const annualFuelUse = (mileage / mpg) * fleet;
  const fuelSavings = annualFuelUse * fuelcost * improvement;

  document.getElementById('results').innerText = `Estimated Annual Fuel Savings: £${fuelSavings.toFixed(2)}`;
  document.getElementById('results').style.display = 'block';
});

</script>
</body>
</html>
